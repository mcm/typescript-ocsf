name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          scope: '@iamthemcmaster'

      - name: Install dependencies
        run: npm ci

      - name: Download OCSF schemas
        run: npm run download

      - name: Generate code
        run: npm run generate

      - name: Build package
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance
